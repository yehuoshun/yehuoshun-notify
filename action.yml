name: yehuoshun Notify
description: 中英双语 GitHub 事件通知 + 自动版本打标 + Release 管理
author: yehuoshun

inputs:
  webhook:
    description: 钉钉机器人 webhook 地址
    required: true
  event:
    description: 覆盖事件类型（用于 release 等场景），默认自动检测
    required: false
    default: ''
  create_release:
    description: 是否自动创建 GitHub Release（默认 true，有自己打包流程的仓库设为 false）
    required: false
    default: 'true'
  changelog_format:
    description: 'git log --pretty=format 模板，用于生成 Release body 中的 changelog'
    required: false
    default: '- **%h** %s (%an, %ad)%n%b'

runs:
  using: composite
  steps:
    - name: Checkout (push only)
      if: github.event_name == 'push'
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        fetch-tags: true

    - name: Auto Tag + Release
      id: tag
      if: github.event_name == 'push'
      shell: bash
      run: |
        MSG="${{ github.event.head_commit.message }}"

        # 除了 README.md 以外的文件有变更 → 需要 tag + release
        CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "")
        NON_README=$(echo "$CHANGED_FILES" | grep -v '^README.md$' | grep -v '^$' || true)

        if [ -n "$NON_README" ]; then
          SHOULD_RELEASE="true"
        else
          SHOULD_RELEASE="false"
        fi
        echo "should_release=$SHOULD_RELEASE" >> $GITHUB_OUTPUT

        # 生成 changelog（上次 release 以来的所有非 merge 提交）
        FMT="${{ inputs.changelog_format }}"
        LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
        if [ -n "$LAST_TAG" ]; then
          LOG=$(git log ${LAST_TAG}..HEAD --pretty=format:"$FMT" --no-merges)
        else
          LOG=$(git log --pretty=format:"$FMT" --no-merges)
        fi
        # 用随机后缀防 heredoc 注入
        CH_DELIM="CHANGELOG_${RANDOM}_$$"
        echo "changelog<<${CH_DELIM}" >> $GITHUB_OUTPUT
        echo "$LOG" >> $GITHUB_OUTPUT
        echo "${CH_DELIM}" >> $GITHUB_OUTPUT

        if [ "$SHOULD_RELEASE" = "true" ]; then
          # 提取版本号：commit message 以 vX.Y 开头 → 直接用
          VER=$(echo "$MSG" | grep -oP '^v\d+(\.\d+)+' | head -1 || true)
          if [ -z "$VER" ]; then
            # 没显式声明 → 找最新 tag，patch +1
            LATEST=$(git tag -l 'v[0-9]*' --sort=-v:refname | head -1)
            if [ -z "$LATEST" ]; then
              VER="v0.0.1"
            else
              IFS='.' read -ra PARTS <<< "${LATEST#v}"
              MAJOR=${PARTS[0]:-0}
              MINOR=${PARTS[1]:-0}
              PATCH=${PARTS[2]:-0}
              PATCH=$((PATCH + 1))
              VER="v${MAJOR}.${MINOR}.${PATCH}"
            fi
          fi
          echo "version=$VER" >> $GITHUB_OUTPUT

          # 创建 tag
          if ! git rev-parse "$VER" >/dev/null 2>&1; then
            git config user.name "github-actions[bot]"
            git config user.email "actions@github.com"
            git tag -a "$VER" -m "Release $VER"
            git push origin "$VER"
            echo "✅ Tagged $VER"
          else
            echo "⏭️ Tag $VER already exists"
          fi
        else
          echo "version=" >> $GITHUB_OUTPUT
          echo "⏭️ Only README changed, skip tag"
        fi

    - name: Create Latest Release
      if: steps.tag.outputs.should_release == 'true' && inputs.create_release == 'true'
      uses: softprops/action-gh-release@v2
      with:
        name: Latest
        tag_name: latest
        body: |
          ## 📝 最近变更 / Recent Changes

          ${{ steps.tag.outputs.changelog }}

          📖 [查看文档 / View Docs](https://github.com/${{ github.repository }}#readme)
        files: SKILL.md
        make_latest: true

    - name: Create Versioned Release
      if: steps.tag.outputs.should_release == 'true' && inputs.create_release == 'true'
      uses: softprops/action-gh-release@v2
      with:
        name: ${{ steps.tag.outputs.version }}
        tag_name: ${{ steps.tag.outputs.version }}
        body: |
          ## 📝 ${{ steps.tag.outputs.version }} 变更 / Changes

          ${{ steps.tag.outputs.changelog }}

          📖 [查看文档 / View Docs](https://github.com/${{ github.repository }}#readme)
        files: SKILL.md

    - name: Send DingTalk Notification
      shell: bash
      env:
        DINGTALK_WEBHOOK: ${{ inputs.webhook }}
        DINGTALK_EVENT: ${{ inputs.event }}
        DINGTALK_VERSION: ${{ steps.tag.outputs.version }}
        DINGTALK_SHOULD_RELEASE: ${{ steps.tag.outputs.should_release }}
        GITHUB_EVENT_NAME: ${{ github.event_name }}
        GITHUB_EVENT_PATH: ${{ github.event_path }}
        GITHUB_REPOSITORY: ${{ github.repository }}
        GITHUB_REF_NAME: ${{ github.ref_name }}
        GITHUB_ACTOR: ${{ github.actor }}
      run: python3 ${{ github.action_path }}/dingtalk-notify.py
