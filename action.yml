name: yehuoshun Notify
description: 中英双语 GitHub 事件通知 + 自动版本打标
author: yehuoshun

inputs:
  webhook:
    description: 钉钉机器人 webhook 地址
    required: true
  event:
    description: 覆盖事件类型（用于 release 等场景），默认自动检测
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: Checkout
      if: github.event_name == 'push'
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Auto Tag from Commit
      if: github.event_name == 'push'
      shell: bash
      run: |
        VER=$(echo "${{ github.event.head_commit.message }}" | grep -oP '^v\d+(\.\d+)*(\s|$)' | head -1 | xargs)
        if [ -n "$VER" ]; then
          if ! git rev-parse "$VER" >/dev/null 2>&1; then
            git config user.name "github-actions[bot]"
            git config user.email "actions@github.com"
            git tag -a "$VER" -m "Release $VER"
            git push origin "$VER"
            echo "✅ Auto Tagged $VER"
          else
            echo "⏭️ Tag $VER already exists"
          fi
        fi

    - name: Send DingTalk Notification
      shell: bash
      env:
        DINGTALK_WEBHOOK: ${{ inputs.webhook }}
        DINGTALK_EVENT: ${{ inputs.event }}
        GITHUB_EVENT_NAME: ${{ github.event_name }}
        GITHUB_EVENT_PATH: ${{ github.event_path }}
        GITHUB_REPOSITORY: ${{ github.repository }}
        GITHUB_REF_NAME: ${{ github.ref_name }}
        GITHUB_ACTOR: ${{ github.actor }}
      run: python3 ${{ github.action_path }}/dingtalk-notify.py
